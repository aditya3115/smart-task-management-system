<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Forgot Password | Smart Task Management System</title>
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/auth.css">
  </head>
  <body>
    <main class="auth-shell d-flex align-items-center py-5">
      <div class="container">
        <div class="row gx-5 justify-content-center">
          <div class="col-12 col-md-10 col-lg-6">
            <section class="auth-panel bg-white shadow p-4 p-md-5" aria-labelledby="forgotPasswordTitle">
              <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                  <h2 id="forgotPasswordTitle" class="h4 mb-2">Forgot password</h2>
                  <p class="text-secondary mb-0">Enter the email tied to your account.</p>
                </div>
                <div class="badge bg-info-soft text-info">Reset link</div>
              </div>

              <div id="forgotPasswordAlert" class="alert d-none" role="alert"></div>

              <form id="forgotPasswordForm" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label">Email address</label>
                  <input type="email" class="form-control" id="email" name="email" autocomplete="email" required>
                  <div class="invalid-feedback">Enter a valid email address.</div>
                </div>

                <button id="forgotPasswordButton" type="submit" class="btn btn-primary w-100 btn-lg">
                  <span class="button-label">Send reset link</span>
                  <span class="spinner-border spinner-border-sm ms-2 d-none" aria-hidden="true"></span>
                </button>
              </form>

              <p class="text-center text-secondary mt-4 mb-0">
                Remembered it?
                <a class="small-link" href="/login.html">Login</a>
              </p>
            </section>
          </div>
        </div>
      </div>
    </main>

    <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/js/forgot-password.js"></script>
  </body>
</html>
