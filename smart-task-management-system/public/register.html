<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Register | Smart Task Management System</title>
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/auth.css">
  </head>
  <body>
    <main class="auth-shell d-flex align-items-center py-5">
      <div class="container">
        <div class="row gx-5 justify-content-center">
          <div class="col-12 col-md-10 col-lg-6">
            <section class="auth-panel bg-white shadow p-4 p-md-5" aria-labelledby="registerTitle">
              <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                  <h2 id="registerTitle" class="h4 mb-2">Create your account</h2>
                  <p class="text-secondary mb-0">Start tracking tasks with clarity.</p>
                </div>
                <div class="badge bg-success-soft text-success">Premium-ready</div>
              </div>

              <div id="registerAlert" class="alert d-none" role="alert"></div>

              <form id="registerForm" novalidate>
                <div class="mb-3">
                  <label for="name" class="form-label">Full name</label>
                  <input type="text" class="form-control" id="name" name="name" autocomplete="name" minlength="2" maxlength="100" required>
                  <div class="invalid-feedback">Name must be between 2 and 100 characters.</div>
                </div>

                <div class="mb-3">
                  <label for="email" class="form-label">Email address</label>
                  <input type="email" class="form-control" id="email" name="email" autocomplete="email" required>
                  <div class="invalid-feedback">Enter a valid email address.</div>
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input type="password" class="form-control" id="password" name="password" autocomplete="new-password" minlength="8" required>
                  <div class="form-text">Must be at least 8 characters, with uppercase, lowercase, and a number.</div>
                  <div class="invalid-feedback">Enter a valid password.</div>
                </div>

                <div class="mb-4">
                  <label for="confirmPassword" class="form-label">Confirm password</label>
                  <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" autocomplete="new-password" minlength="8" required>
                  <div class="invalid-feedback">Passwords must match.</div>
                </div>

                <button id="registerButton" type="submit" class="btn btn-primary w-100 btn-lg">
                  <span class="button-label">Create account</span>
                  <span class="spinner-border spinner-border-sm ms-2 d-none" aria-hidden="true"></span>
                </button>
              </form>

              <p class="text-center text-secondary mt-4 mb-0">
                Already have an account?
                <a class="small-link" href="/login.html">Login</a>
              </p>
            </section>
          </div>
        </div>
      </div>
    </main>

    <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/js/register.js"></script>
  </body>
</html>
