<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile | Smart Task Management System</title>
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
      <div class="container-fluid px-3 px-lg-4">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/dashboard.html"><span class="brand-mark-sm">ST</span><span>Smart Tasks</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
            <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/tasks.html">Task List</a></li>
            <li class="nav-item"><a class="nav-link" href="/add-task.html">Add Task</a></li>
            <li class="nav-item"><a class="nav-link" href="/events.html">Events</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="/profile.html">Profile</a></li>
            <li class="nav-item ms-lg-2"><button id="logoutButton" class="btn btn-outline-danger btn-sm" type="button">Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="app-main">
      <div class="container-fluid px-3 px-lg-4 py-4">
        <div id="profileAlert" class="alert d-none" role="alert"></div>
        <section class="page-heading mb-4">
          <div>
            <p class="text-secondary mb-1">Profile</p>
            <h1 class="h3 mb-1">Account Details</h1>
            <p class="text-secondary mb-0">View your current signed-in user information.</p>
          </div>
        </section>

        <section class="content-panel profile-card mx-auto">
          <div id="profileLoading" class="loading-state">
            <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading</span></div>
          </div>
          <div id="profileContent" class="d-none">
            <div class="profile-header mb-4">
              <div id="profileInitials" class="profile-avatar">ST</div>
              <div>
                <h2 id="profileName" class="h4 mb-1">User</h2>
                <p id="profileEmail" class="text-secondary mb-0">user@example.com</p>
              </div>
            </div>

            <dl class="profile-list mb-4">
              <div>
                <dt>Role</dt>
                <dd id="profileRole">User</dd>
              </div>
              <div>
                <dt>Joined</dt>
                <dd id="profileCreated">No date</dd>
              </div>
            </dl>

            <div class="profile-actions mt-4">
              <a class="btn btn-primary" href="/tasks.html">Task List</a>
              <a class="btn btn-outline-secondary" href="/dashboard.html">Dashboard</a>
              <button class="btn btn-outline-danger" id="profileLogoutButton" type="button">Logout</button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app-common.js"></script>
    <script src="/js/profile.js"></script>
  </body>
</html>
