<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Login | Smart Task Management System</title>
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/auth.css">
  </head>
  <body>
    <main class="auth-shell d-flex align-items-center py-5">
      <div class="container">
        <div class="row gx-5 justify-content-center">
          <div class="col-12 col-md-10 col-lg-6">
            <section class="auth-panel bg-white shadow p-4 p-md-5" aria-labelledby="loginTitle">
              <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                  <h2 id="loginTitle" class="h4 mb-2">Welcome back</h2>
                  <p class="text-secondary mb-0">Sign in to access your task hub.</p>
                </div>
                <div class="badge bg-primary-soft text-primary">Secure login</div>
              </div>

              <div id="loginAlert" class="alert d-none" role="alert"></div>

              <form id="loginForm" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label">Email address</label>
                  <input type="email" class="form-control" id="email" name="email" autocomplete="email" required>
                  <div class="invalid-feedback">Enter a valid email address.</div>
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
                  <div class="invalid-feedback">Password is required.</div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="1" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                  </div>
                  <a class="small-link" href="/forgot-password.html">Forgot password?</a>
                </div>

                <button id="loginButton" type="submit" class="btn btn-primary w-100 btn-lg">
                  <span class="button-label">Login</span>
                  <span class="spinner-border spinner-border-sm ms-2 d-none" aria-hidden="true"></span>
                </button>
              </form>

              <p class="text-center text-secondary mt-4 mb-0">
                New to ST?
                <a class="small-link" href="/register.html">Create an account</a>
              </p>
            </section>
          </div>
        </div>
      </div>
    </main>

    <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
