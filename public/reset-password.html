<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Reset Password | Smart Task Management System</title>
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/auth.css">
  </head>
  <body>
    <main class="auth-shell d-flex align-items-center py-5">
      <div class="container">
        <div class="row gx-5 justify-content-center">
          <div class="col-12 col-md-10 col-lg-6">
            <section class="auth-panel bg-white shadow p-4 p-md-5" aria-labelledby="resetPasswordTitle">
              <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                  <h2 id="resetPasswordTitle" class="h4 mb-2">Reset password</h2>
                  <p class="text-secondary mb-0">Choose a new password for your account.</p>
                </div>
                <div class="badge bg-warning-soft text-warning">Security first</div>
              </div>

              <div id="resetPasswordAlert" class="alert d-none" role="alert"></div>

              <form id="resetPasswordForm" novalidate>
                <input type="hidden" id="token" name="token">
                <div class="mb-3">
                  <label for="password" class="form-label">New password</label>
                  <input type="password" class="form-control" id="password" name="password" autocomplete="new-password" required minlength="8">
                  <div class="invalid-feedback">Enter a valid new password.</div>
                </div>
                <div class="mb-3">
                  <label for="confirmPassword" class="form-label">Confirm password</label>
                  <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required minlength="8">
                  <div class="invalid-feedback">Passwords must match.</div>
                </div>
                <button id="resetPasswordButton" type="submit" class="btn btn-primary w-100 btn-lg">
                  <span class="button-label">Reset password</span>
                  <span class="spinner-border spinner-border-sm ms-2 d-none" aria-hidden="true"></span>
                </button>
              </form>

              <p class="text-center text-secondary mt-4 mb-0">
                Back to
                <a class="small-link" href="/login.html">Login</a>
              </p>
            </section>
          </div>
        </div>
      </div>
    </main>

    <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/js/reset-password.js"></script>
  </body>
</html>
